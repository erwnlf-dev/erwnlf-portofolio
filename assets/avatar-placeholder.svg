<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="1" />
      <stop offset="100%" stop-color="#020617" stop-opacity="1" />
    </radialGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    
    <linearGradient id="accentTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Background Ring -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="2" />
  
  <!-- Glowing Network Nodes in background of avatar -->
  <g opacity="0.3" stroke="#0ea5e9" stroke-width="1">
    <line x1="60" y1="60" x2="100" y2="40" />
    <line x1="100" y1="40" x2="140" y2="60" />
    <line x1="140" y1="60" x2="140" y2="110" />
    <line x1="60" y1="60" x2="60" y2="110" />
    
    <circle cx="60" cy="60" r="3" fill="#2dd4bf" />
    <circle cx="100" cy="40" r="3" fill="#0ea5e9" />
    <circle cx="140" cy="60" r="3" fill="#2dd4bf" />
  </g>

  <!-- Stylized IT Engineer Profile Silhouette -->
  <!-- Shoulders / Torso -->
  <path d="M 45,165 C 45,135 70,125 100,125 C 130,125 155,135 155,165" 
        fill="none" 
        stroke="url(#accentCyan)" 
        stroke-width="5" 
        stroke-linecap="round" 
        filter="url(#glow)" />
        
  <!-- Head -->
  <circle cx="100" cy="80" r="28" fill="none" stroke="url(#accentTeal)" stroke-width="5" filter="url(#glow)" />
  
  <!-- Headset / Tech Detail -->
  <path d="M 72,80 A 28,28 0 0,1 128,80" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" opacity="0.7" />
  <rect x="67" y="75" width="6" height="12" rx="3" fill="#0ea5e9" />
  <rect x="127" y="75" width="6" height="12" rx="3" fill="#0ea5e9" />
  <path d="M 127,87 C 127,100 115,102 108,102" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" />
  
  <!-- Modern Geometric Accents -->
  <circle cx="100" cy="125" r="4" fill="#38bdf8" />
  <circle cx="100" cy="100" r="2" fill="#2dd4bf" />
  
</svg>
